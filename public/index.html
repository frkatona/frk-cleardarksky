<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>State College Clear Sky</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">
            Astrophotography Dashboard (from
            <a id="eyebrowSourceLink" href="https://www.cleardarksky.com/c/StateCollegePAkey.html?1" rel="noreferrer" target="_blank">cleardarksky</a>)
          </p>
          <h1 id="pageTitle">State College Clear Sky</h1>
          <p class="source-line" id="sourceLine">Loading forecast...</p>
        </div>
        <div class="header-actions">
          <button class="icon-button" id="refreshButton" type="button" title="Refresh forecast">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a9 9 0 0 1-15.3 6.4"></path>
              <path d="M3 12A9 9 0 0 1 18.3 5.6"></path>
              <path d="M18 2v4h-4"></path>
              <path d="M6 22v-4h4"></path>
            </svg>
            <span>Refresh</span>
          </button>
          <a class="source-link" id="sourceLink" href="https://www.cleardarksky.com/c/StateCollegePAkey.html?1" rel="noreferrer" target="_blank">Source</a>
        </div>
      </header>

      <main>
        <section class="weather-hero" id="weatherHero" aria-live="polite">
          <div class="hero-primary">
            <div class="hero-icon" id="heroIcon"></div>
            <div>
              <p class="hero-location">State College</p>
              <p class="hero-condition" id="heroCondition">Loading forecast...</p>
            </div>
          </div>
          <div class="hero-score">
            <p class="score-number" id="heroScore">--</p>
            <p class="score-label">observing score</p>
          </div>
          <p class="hero-meta" id="heroMeta">Pulling chart data from Clear Dark Sky.</p>
          <div class="hero-night-scores" id="heroNightScores" aria-label="Night score forecast"></div>
        </section>

        <!-- <section class="hourly-panel" aria-label="Hourly forecast">
          <div class="section-heading">
            <h2>Hourly</h2>
            <p id="hourlySummary"></p>
          </div>
          <div class="hourly-strip" id="hourlyStrip"></div>
        </section> -->

        <!-- <section class="summary-grid" id="summaryGrid" aria-label="Observing details">
          <article class="summary-card loading"></article>
          <article class="summary-card loading"></article>
          <article class="summary-card loading"></article>
          <article class="summary-card loading"></article>
        </section> -->

        <section class="toolbar" aria-label="Forecast controls">
          <div class="control-cluster">
            <div class="segmented-control" role="group" aria-label="Visible hours">
              <button class="segment is-active" type="button" data-mode="all">All</button>
              <button class="segment" type="button" data-mode="night">Night</button>
            </div>
            <label class="switch-control" for="graphToggle">
              <input id="graphToggle" type="checkbox">
              <span class="switch-track" aria-hidden="true">
                <span class="switch-thumb"></span>
              </span>
              <span class="switch-text">Graphs</span>
            </label>
          </div>
          <p class="status-text" id="statusText">Fetching latest chart data...</p>
        </section>

        <section class="forecast-panel" aria-label="Hourly conditions grid">
          <div class="section-heading forecast-heading">
            <h2>Hourly Conditions</h2>
          </div>
          <div class="forecast-scroll" id="forecastScroll">
            <div class="forecast-grid" id="forecastGrid"></div>
          </div>
        </section>

        <!-- <section class="legend-panel" aria-label="Forecast legend">
          <div class="section-heading">
            <h2>Legend</h2>
          </div>
          <div class="legend-grid" id="legendGrid"></div>
        </section> -->

        <details class="original-chart" id="originalChartWrap">
          <summary>Original chart image</summary>
          <a id="originalChartLink" href="#" target="_blank" rel="noreferrer">
            <img id="originalChart" alt="">
          </a>
        </details>
      </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
